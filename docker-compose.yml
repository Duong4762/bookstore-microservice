services:
  # Customer Service - Port 8001
  customer-service:
    build:
      context: .
      dockerfile: customer_service/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./customer_service:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=customer_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CART_SERVICE_URL=http://cart-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # Product Service (DDD) - Port 8002
  product-service:
    build:
      context: .
      dockerfile: product_service/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./product_service:/app
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - POSTGRES_DB=product_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate --settings=config.settings.dev && python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev"

  # Cart Service - Port 8003
  cart-service:
    build:
      context: .
      dockerfile: cart_service/Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ./cart_service:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=cart_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - PRODUCT_SERVICE_URL=http://product-service:8000
    depends_on:
      product-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # Order Service - Port 8004
  order-service:
    build:
      context: .
      dockerfile: order_service/Dockerfile
    ports:
      - "8004:8000"
    volumes:
      - ./order_service:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=order_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CART_SERVICE_URL=http://cart-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
      - SHIPPING_SERVICE_URL=http://shipping-service:8000
    depends_on:
      cart-service:
        condition: service_started
      payment-service:
        condition: service_started
      shipping-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # Payment Service - Port 8005
  payment-service:
    build:
      context: .
      dockerfile: payment_service/Dockerfile
    ports:
      - "8005:8000"
    volumes:
      - ./payment_service:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # Shipping Service - Port 8006
  shipping-service:
    build:
      context: .
      dockerfile: shipping_service/Dockerfile
    ports:
      - "8006:8000"
    volumes:
      - ./shipping_service:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=shipping_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # Comment and Rating Service - Port 8007
  rating-service:
    build:
      context: .
      dockerfile: comment_and_rating_service/Dockerfile
    ports:
      - "8007:8000"
    volumes:
      - ./comment_and_rating_service:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=rating_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      product-service:
        condition: service_started
      customer-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  # ── AI Recommendation Service - Port 8008 ────────────────────────────────
  recommender-service:
    build:
      context: .
      dockerfile: ai_recommendation_service/Dockerfile
    ports:
      - "8008:8000"
    volumes:
      - ./ai_recommendation_service:/app
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - REDIS_URL=redis://redis:6379/0
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - POSTGRES_DB=ai_recommendation_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyDXpI9lUOFilhIM3BZKxZUCmC1wJhd55pk}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      # URL công khai của API Gateway (vd: http://localhost:8000) để chat in link đầy đủ; để trống = chỉ /products/{id}/
      - CHAT_STORE_BASE_URL=${CHAT_STORE_BASE_URL:-http://localhost:8000}
    depends_on:
      redis:
        condition: service_started
      product-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate --settings=config.settings.dev && python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev"

  # ── PostgreSQL (all Django services) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init-multiple-dbs.sh:/docker-entrypoint-initdb.d/postgres-init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Redis (cache) ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Seed product data automatically after product schema is ready
  product-seed:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
    volumes:
      - ./product_service/sql/seed_products.sql:/seed/seed_products.sql:ro
    environment:
      - PGPASSWORD=postgres
    command: >
      sh -c "
      until pg_isready -h postgres -p 5432 -U postgres -d product_db; do sleep 2; done;
      until psql -h postgres -p 5432 -U postgres -d product_db -tAc \"SELECT to_regclass('public.products')\" | grep -q products; do sleep 2; done;
      psql -h postgres -p 5432 -U postgres -d product_db -f /seed/seed_products.sql
      "
    restart: "no"

  # API Gateway with UI - Port 8000
  api-gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api_gateway:/app
    environment:
      - DEBUG=True
      - POSTGRES_DB=gateway_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - CUSTOMER_SERVICE_URL=http://customer-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
      - SHIPPING_SERVICE_URL=http://shipping-service:8000
      - RATING_SERVICE_URL=http://rating-service:8000
      - RECOMMENDER_SERVICE_URL=http://recommender-service:8000
      - STAFF_USERNAME=staff
      - STAFF_PASSWORD=staff123
    depends_on:
      customer-service:
        condition: service_started
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      shipping-service:
        condition: service_started
      rating-service:
        condition: service_started
      recommender-service:
        condition: service_started
      product-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

volumes:
  redis_data:
  postgres_data:
