<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nhan vien{% endblock %} — Product Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'staff_product_list' %}"><i class="bi bi-shield-lock"></i> Khu vuc nhan vien</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link text-white-50" href="{% url 'home' %}"><i class="bi bi-shop"></i> Cua hang</a>
            {% if request.session.staff_authenticated %}
            <a class="nav-link text-white-50" href="{% url 'staff_logout' %}"><i class="bi bi-box-arrow-right"></i> Dang xuat</a>
            {% endif %}
        </div>
    </div>
</nav>
{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
</div>
{% endif %}
<main class="container py-4">
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
