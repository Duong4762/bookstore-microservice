{% extends 'gateway/base.html' %}

{% block title %}Đăng nhập - Product Store{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                    </h3>
                </div>
                <div class="card-body">
                    <p class="text-muted small mb-4">
                        Nhập email bạn đã dùng khi đăng ký. (Bản demo: chưa có mật khẩu.)
                    </p>
                    <form method="POST" action="{% url 'customer_account_login' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Email: <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" required autocomplete="email" placeholder="you@example.com">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle"></i> Đăng nhập
                            </button>
                            <a href="{% url 'customer_create' %}" class="btn btn-outline-primary">
                                <i class="bi bi-person-plus"></i> Chưa có tài khoản? Đăng ký
                            </a>
                            <a href="{% url 'home' %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Về trang chủ
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
